<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GotPhoto Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <img src="assets/gotphoto-logo.svg" alt="GotPhoto" class="logo-img">
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-profile">
        <div class="avatar-circle avatar-sm">BK</div>
        <div class="sidebar-profile-info">
          <div class="sidebar-profile-name">Bert Kiefer</div>
          <div class="sidebar-profile-biz">ChoicePix Photography</div>
        </div>
      </div>
    </aside>
    <main class="content" id="content">
      <header class="topbar" id="topbar"></header>
      <div class="page-content" id="pageContent"></div>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
